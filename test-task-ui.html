<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task UI Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
    }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid #ddd;
      margin-bottom: 5px;
      border-radius: 4px;
    }
    .task-checkbox {
      cursor: pointer;
    }
    .task-text {
      flex: 1;
    }
    .task-edit-input {
      flex: 1;
      padding: 5px;
    }
    button {
      padding: 5px 10px;
      cursor: pointer;
    }
    #task-form {
      margin-bottom: 20px;
    }
    #task-input {
      padding: 8px;
      width: 70%;
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <h1>Task List UI Test</h1>
  
  <section class="tasks-section">
    <h2>Tasks</h2>
    <form id="task-form">
      <input 
        type="text" 
        id="task-input" 
        placeholder="Add a new task..." 
        autocomplete="off"
      >
      <button type="submit">Add Task</button>
    </form>
    <div id="task-list"></div>
  </section>

  <script src="js/app.js"></script>
  
  <script>
    // Test script to verify functionality
    console.log('Task UI Test loaded');
    
    // Wait for initialization
    setTimeout(() => {
      console.log('Current tasks:', tasks);
      console.log('Task list initialized:', taskList !== undefined);
    }, 100);
  </script>
</body>
</html>
